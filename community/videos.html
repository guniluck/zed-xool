<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zedcom - Videos</title>
  <style>
    :root {
      --green: #198a00;
      --bg: #f0f2f5;
      --white: #fff;
      --border: #dadde1;
      --text: #1c1e21;
      --gray: #65676b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 600px;
      margin: 0 auto;
      background: var(--white);
      min-height: 100vh;
      padding-bottom: 70px;
    }

    .header {
      background: var(--green);
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header a {
      color: white;
      text-decoration: none;
      font-size: 20px;
    }

    .header h1 {
      font-size: 20px;
    }

    .video-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      padding: 2px;
    }

    .v-item {
      position: relative;
      background: black;
      aspect-ratio: 9/16;
      overflow: hidden;
      cursor: pointer;
    }

    .v-item video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .v-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
      color: white;
      font-size: 11px;
      font-weight: 500;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 600px;
      background: white;
      display: flex;
      border-top: 1px solid var(--border);
      z-index: 100;
    }

    .bn-item {
      flex: 1;
      padding: 6px 2px;
      text-align: center;
      text-decoration: none;
      color: var(--gray);
      font-size: 10px;
      font-weight: 600;
    }

    .bn-item .bn-icon {
      font-size: 18px;
      display: block;
    }

    .bn-item.active {
      color: var(--green);
    }

    @media (min-width: 768px) {
      .app {
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="header"><a href="index.html">←</a>
      <h1>🎬 Videos</h1>
    </header>
    <div class="video-grid" id="videoGrid"></div>
    <nav class="bottom-nav"><a href="index.html" class="bn-item"><span class="bn-icon">🏠</span>Home</a><a
        href="videos.html" class="bn-item active"><span class="bn-icon">🎬</span>Videos</a><a href="friends.html"
        class="bn-item"><span class="bn-icon">👥</span>Friends</a><a href="pages.html" class="bn-item"><span
          class="bn-icon">📄</span>Pages</a><a href="groups.html" class="bn-item"><span
          class="bn-icon">👪</span>Groups</a><a href="chats.html" class="bn-item"><span
          class="bn-icon">💬</span>Chats</a></nav>
  </div>
  <script>
    const DB = { get(k) { try { return JSON.parse(localStorage.getItem('zc_' + k)); } catch (e) { return null; } }, posts() { return this.get('posts') || []; } };
    function load() { const v = DB.posts().filter(p => p.mediaType === 'video'); const g = document.getElementById('videoGrid'); g.innerHTML = v.length ? v.map(p => `<div class="v-item"><video src="${p.mediaData}" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video><div class="v-overlay"><strong>${p.author}</strong> • ❤️ ${(p.likes || []).length}</div></div>`).join('') : '<p style="text-align:center;padding:60px;grid-column:span 2;color:var(--gray);">No videos yet.</p>'; }
    load();
  </script>
</body>

</html>
