<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zedcom - Pages</title>
  <style>
    :root {
      --green: #198a00;
      --bg: #f0f2f5;
      --white: #fff;
      --border: #dadde1;
      --text: #1c1e21;
      --gray: #65676b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 600px;
      margin: 0 auto;
      background: var(--white);
      min-height: 100vh;
      padding-bottom: 70px;
    }

    .header {
      background: var(--green);
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header a {
      color: white;
      text-decoration: none;
      font-size: 20px;
    }

    .header h1 {
      font-size: 20px;
      flex: 1;
    }

    .btn-sm {
      padding: 6px 14px;
      background: white;
      color: var(--green);
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }

    .page-list {
      padding: 16px;
    }

    .page-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
    }

    .page-av {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #ef7d00;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 20px;
    }

    .page-info {
      flex: 1;
    }

    .page-name {
      font-weight: 600;
    }

    .page-cat {
      font-size: 12px;
      color: var(--gray);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-box {
      background: white;
      border-radius: 12px;
      padding: 20px;
      width: 90%;
      max-width: 400px;
    }

    .modal-box input,
    .modal-box select,
    .modal-box textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 600px;
      background: white;
      display: flex;
      border-top: 1px solid var(--border);
    }

    .bn-item {
      flex: 1;
      padding: 6px 2px;
      text-align: center;
      text-decoration: none;
      color: var(--gray);
      font-size: 10px;
      font-weight: 600;
    }

    .bn-item .bn-icon {
      font-size: 18px;
      display: block;
    }

    .bn-item.active {
      color: var(--green);
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="header"><a href="index.html">←</a>
      <h1>📄 Pages</h1><button class="btn-sm" onclick="openCreate()">+ Create</button>
    </header>
    <div class="page-list" id="pageList"></div>
    <nav class="bottom-nav"><a href="index.html" class="bn-item"><span class="bn-icon">🏠</span>Home</a><a
        href="videos.html" class="bn-item"><span class="bn-icon">🎬</span>Videos</a><a href="friends.html"
        class="bn-item"><span class="bn-icon">👥</span>Friends</a><a href="pages.html" class="bn-item active"><span
          class="bn-icon">📄</span>Pages</a><a href="groups.html" class="bn-item"><span
          class="bn-icon">👪</span>Groups</a><a href="chats.html" class="bn-item"><span
          class="bn-icon">💬</span>Chats</a></nav>
  </div>
  <div class="modal" id="createModal">
    <div class="modal-box">
      <h3>Create Page</h3>
      <form onsubmit="createPage(event)"><input type="text" id="pName" placeholder="Page Name" required><select
          id="pCat">
          <option value="">Category</option>
          <option>Business</option>
          <option>Entertainment</option>
          <option>Education</option>
          <option>News</option>
          <option>Sports</option>
        </select><textarea id="pDesc" placeholder="Description" rows="2"></textarea><button type="submit" class="btn-sm"
          style="width:100%;background:var(--green);color:white;">Create</button></form>
    </div>
  </div>
  <script>
    const DB = { get(k) { return JSON.parse(localStorage.getItem('zc_' + k) || 'null'); }, set(k, v) { localStorage.setItem('zc_' + k, JSON.stringify(v)); }, pages() { return this.get('pages') || []; } };
    const cu = localStorage.getItem('zc_cur');
    function load() { const p = DB.pages(); document.getElementById('pageList').innerHTML = p.length ? p.map(x => `<div class="page-card"><div class="page-av">${x.name[0]}</div><div class="page-info"><div class="page-name">${x.name}</div><div class="page-cat">${x.category} • ${x.followers?.length || 0} followers</div></div></div>`).join('') : '<p style="text-align:center;padding:40px;">No pages yet.</p>'; }
    function openCreate() { document.getElementById('createModal').classList.add('show'); }
    function createPage(e) { e.preventDefault(); const pg = { id: Date.now().toString(), name: document.getElementById('pName').value, category: document.getElementById('pCat').value, description: document.getElementById('pDesc').value, creator: cu, followers: [cu], created: new Date().toISOString() }; DB.set('pages', [...DB.pages(), pg]); document.getElementById('createModal').classList.remove('show'); load(); }
    load();
  </script>
</body>

</html>
