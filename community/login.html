<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Zedcom - Sign Up / Log In</title>
  <style>
    :root {
      --green: #198a00;
      --red: #de2010;
      --orange: #ef7d00;
      --gold: #ffb900;
      --bg: #f0f2f5;
      --white: #fff;
      --border: #dadde1;
      --text: #1c1e21;
      --gray: #65676b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #e8f5e9 0%, #f0f2f5 50%, #fff3e0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .auth-wrapper {
      width: 100%;
      max-width: 440px;
    }

    .auth-card {
      background: var(--white);
      border-radius: 20px;
      padding: 32px 24px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
      border-top: 5px solid var(--green);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .auth-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 12px;
      background: linear-gradient(135deg, var(--green), var(--orange));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: 0 6px 20px rgba(25, 138, 0, 0.3);
    }

    .auth-header h1 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--green), var(--orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .auth-header p {
      color: var(--gray);
      font-size: 14px;
      margin-top: 4px;
    }

    .auth-tabs {
      display: flex;
      background: var(--bg);
      border-radius: 14px;
      padding: 5px;
      margin-bottom: 24px;
      gap: 5px;
    }

    .auth-tab {
      flex: 1;
      padding: 12px 8px;
      border: none;
      background: none;
      cursor: pointer;
      font-weight: 700;
      font-size: 15px;
      border-radius: 10px;
      transition: all 0.3s;
      color: var(--gray);
      text-align: center;
    }

    .auth-tab.active {
      background: var(--green);
      color: white;
      box-shadow: 0 3px 10px rgba(25, 138, 0, 0.3);
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 5px;
      font-size: 13px;
      color: var(--text);
    }

    .form-input {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.2s;
      outline: none;
      background: #fafafa;
      -webkit-appearance: none;
    }

    .form-input:focus {
      border-color: var(--green);
      background: white;
      box-shadow: 0 0 0 4px rgba(25, 138, 0, 0.08);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }

    .btn-primary {
      background: var(--green);
      color: white;
    }

    .btn-primary:hover {
      background: #147a00;
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(25, 138, 0, 0.3);
    }

    .hidden {
      display: none !important;
    }

    .error-msg {
      color: var(--red);
      font-size: 13px;
      margin-top: 4px;
      margin-bottom: 6px;
      display: none;
    }

    select.form-input {
      appearance: auto;
      background-image: none;
      padding-right: 16px;
    }

    /* Responsive adjustments for small screens */
    @media (max-width: 480px) {
      .auth-card {
        padding: 24px 16px;
        border-radius: 16px;
      }

      .auth-header h1 {
        font-size: 28px;
      }

      .auth-logo {
        width: 70px;
        height: 70px;
        font-size: 36px;
      }

      .form-row {
        grid-template-columns: 1fr;
        /* stack fields on mobile */
      }

      .form-input {
        font-size: 16px;
        /* prevent zoom on iOS */
        padding: 14px 16px;
      }

      .btn {
        padding: 14px;
      }
    }

    @media (max-width: 360px) {
      .auth-card {
        padding: 20px 12px;
      }

      .auth-tab {
        font-size: 14px;
        padding: 10px 6px;
      }

      .auth-header h1 {
        font-size: 24px;
      }

      .auth-header p {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">🇿🇲</div>
        <h1>Zedcom</h1>
        <p>Connect with friends in Zambia</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Log In</button>
        <button class="auth-tab" onclick="switchTab('register')">Create Account</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Username or Email</label>
          <input type="text" class="form-input" id="loginUser" placeholder="Enter username or email" required
            autocomplete="username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" class="form-input" id="loginPass" placeholder="Enter password" required
            autocomplete="current-password">
        </div>
        <p class="error-msg" id="loginError">Invalid credentials. Please try again.</p>
        <button type="submit" class="btn btn-primary">Log In</button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" class="form-input" id="regName" placeholder="Your full name" required autocomplete="name">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Username</label>
            <input type="text" class="form-input" id="regUser" placeholder="Choose username" required
              autocomplete="username">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" class="form-input" id="regEmail" placeholder="Your email" required autocomplete="email">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Password</label>
            <input type="password" class="form-input" id="regPass" placeholder="Min 6 characters" required minlength="6"
              autocomplete="new-password">
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" class="form-input" id="regConfirm" placeholder="Confirm password" required
              autocomplete="new-password">
          </div>
        </div>
        <div class="form-group">
          <label>Province</label>
          <select class="form-input" id="regLocation">
            <option value="">Select your province</option>
            <option>Lusaka</option>
            <option>Copperbelt</option>
            <option>Southern</option>
            <option>Eastern</option>
            <option>Western</option>
            <option>Northern</option>
            <option>Muchinga</option>
            <option>Central</option>
            <option>Luapula</option>
          </select>
        </div>
        <p class="error-msg" id="regError">Please fix the errors above.</p>
        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>

      <!-- Demo credentials are no longer shown here -->
    </div>
  </div>

  <script>
    const DB = {
      get(k) { try { return JSON.parse(localStorage.getItem('zc_' + k)); } catch (e) { return null; } },
      set(k, v) { localStorage.setItem('zc_' + k, JSON.stringify(v)); },
      users() { return this.get('users') || {}; }
    };

    function initDefaults() {
      const u = DB.users();
      if (!u['admin']) {
        u['admin'] = {
          fullName: 'Administrator',
          username: 'admin',
          email: 'salome@gmail.com',        // updated email
          password: 'the-one',              // updated password
          location: 'Lusaka',
          profilePic: '',
          bio: 'Official Zedcom Admin 🇿🇲',
          joinedDate: new Date().toISOString()
        };
      }
      if (!u['demo']) {
        u['demo'] = {
          fullName: 'Mwila Banda',
          username: 'demo',
          email: 'demo@zedcom.zm',
          password: 'demo123',
          location: 'Copperbelt',
          profilePic: '',
          bio: 'Music lover 🎵 | Photographer 📷',
          joinedDate: new Date().toISOString()
        };
      }
      DB.set('users', u);
    }

    function switchTab(t) {
      document.querySelectorAll('.auth-tab').forEach(x => x.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('loginForm').classList.toggle('hidden', t !== 'login');
      document.getElementById('registerForm').classList.toggle('hidden', t !== 'register');
      document.getElementById('loginError').style.display = 'none';
      document.getElementById('regError').style.display = 'none';
    }

    function handleLogin(e) {
      e.preventDefault();
      document.getElementById('loginError').style.display = 'none';
      const userInput = document.getElementById('loginUser').value.trim();
      const pass = document.getElementById('loginPass').value;
      const users = DB.users();
      let found = null;
      for (let u in users) {
        if ((users[u].username === userInput || users[u].email === userInput) && users[u].password === pass) {
          found = u;
          break;
        }
      }
      if (!found) {
        document.getElementById('loginError').style.display = 'block';
        return;
      }
      localStorage.setItem('zc_cur', found);
      window.location.href = 'index.html';
    }

    function handleRegister(e) {
      e.preventDefault();
      document.getElementById('regError').style.display = 'none';
      const name = document.getElementById('regName').value.trim();
      const username = document.getElementById('regUser').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const pass = document.getElementById('regPass').value;
      const confirm = document.getElementById('regConfirm').value;
      const location = document.getElementById('regLocation').value;

      if (pass !== confirm) {
        document.getElementById('regError').textContent = 'Passwords do not match!';
        document.getElementById('regError').style.display = 'block';
        return;
      }
      if (pass.length < 6) {
        document.getElementById('regError').textContent = 'Password must be at least 6 characters!';
        document.getElementById('regError').style.display = 'block';
        return;
      }
      if (!location) {
        document.getElementById('regError').textContent = 'Please select your province!';
        document.getElementById('regError').style.display = 'block';
        return;
      }

      const users = DB.users();
      if (users[username]) {
        document.getElementById('regError').textContent = 'Username already taken!';
        document.getElementById('regError').style.display = 'block';
        return;
      }

      users[username] = {
        fullName: name,
        username,
        email,
        password: pass,
        location,
        profilePic: '',
        bio: '',
        joinedDate: new Date().toISOString()
      };
      DB.set('users', users);
      alert('Account created successfully! Please log in.');
      // Switch to login tab and clear form
      document.querySelectorAll('.auth-tab').forEach(x => x.classList.remove('active'));
      document.querySelector('.auth-tab:first-child').classList.add('active'); // login tab
      document.getElementById('loginForm').classList.remove('hidden');
      document.getElementById('registerForm').classList.add('hidden');
      document.getElementById('registerForm').reset();
    }

    initDefaults();
  </script>
</body>

</html>
